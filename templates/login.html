{% extends "authorisation_base.html" %}
{% block form_inner %}
<h1>Авторизация</h1>
{% for msg in get_flashed_messages() %}
<div class="flash">{{msg}}</div>
{% endfor %}
<div class="input-box">
    <input type="text" name="login" placeholder="Логин">
    <img class="input-box__images" src="{{ url_for('static', filename='login_form/images/user.svg') }}">
</div>
<div class="input-box">
    <input type="password" name="password" placeholder="Пароль">
    <img class="input-box__images" src="{{ url_for('static', filename='login_form/images/lock.svg') }}">
</div>
<div class="remember-forgot">
    <label><input type="checkbox" name="remember">Запомнить меня</label>
    <a>Забыли пароль?</a>
</div>
<button type="submit" class="btn">Войти</button>
<div class="register">
    <p>Нет учетной записи? <a class="register__link">Зарегистрироваться</a></p>
</div>
{% endblock %}
{% block footer %}
<script>register()</script>
{% endblock %}
